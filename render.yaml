# One-click backend deploy on Render (Blueprint).
# In Render: New → Blueprint → connect this repo. Then set the secret env vars.
services:
  - type: web
    name: lumen-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: APIFY_TOKEN
        sync: false   # set in the Render dashboard (secret)
      - key: ANTHROPIC_API_KEY
        sync: false   # set in the Render dashboard (secret)
